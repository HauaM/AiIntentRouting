services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: intent_routing
      POSTGRES_USER: intent
      POSTGRES_PASSWORD: intent
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U intent -d intent_routing"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
