services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: intent_routing
      POSTGRES_USER: intent
      POSTGRES_PASSWORD: intent
    ports:
      - "127.0.0.1:30142:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U intent -d intent_routing"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    profiles:
      - runtime
    build:
      context: .
    image: intent-routing:local
    env_file:
      - ${INTENT_ROUTING_ENV_FILE:-.env.closed-network.example}
    depends_on:
      postgres:
        condition: service_healthy
    command: "uv run alembic upgrade head"

  api:
    profiles:
      - runtime
    build:
      context: .
    image: intent-routing:local
    env_file:
      - ${INTENT_ROUTING_ENV_FILE:-.env.closed-network.example}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command: "uv run uvicorn intent_routing.main:create_app --factory --host 0.0.0.0 --port 8000"
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - /models/bge-m3:/models/bge-m3:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/readyz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  postgres_data:
